name: Lighthouse Audit

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build JS bundle
        run: |
          npm run build:js

      - name: Install http-server
        run: |
          npm install -g http-server

      - name: Start static server
        run: |
          npx http-server -p 8080 &

      - name: Wait for server
        uses: jakejarvis/wait-action@v0.2.0
        with:
          url: http://127.0.0.1:8080
          timeout: 30

      - name: Install Chromium (if not present)
        run: |
          sudo apt-get update -y && sudo apt-get install -y chromium-browser || true

      - name: Run Lighthouse
        run: |
          npx lighthouse http://127.0.0.1:8080 --output html --output-path=reports/lighthouse.html --chrome-flags='--headless --no-sandbox'

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: reports/lighthouse.html
