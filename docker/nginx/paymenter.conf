server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect legacy /index.html requests to root to keep canonical URLs consistent
    location = /index.html {
        return 301 https://$host/;
    }

    # Enable gzip compression for text-based responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_vary on;

    # Security headers - move CSP out of meta tags into server headers for strict deployment
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Content-Security-Policy (example). This configuration assumes JSON-LD is loaded from same-origin
    # and no inline scripts/styles remain. Adjust domains (fonts, cdn) as needed before enabling.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://discord.com https://achat.velaryonhosting.fr; connect-src 'self' https://discord.com https://achat.velaryonhosting.fr; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

    # Brotli compression (requires nginx built with brotli module)
    brotli on;
    brotli_comp_level 5;
    brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Serve precompressed files when available (optional). If you precompress assets during build,
    # add `try_files $uri $uri.gz $uri.br =404;` in the static location.

    # Proxy / to backend service
    location / {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy /paymenter to Paymenter service
    location /paymenter/ {
        proxy_pass http://paymenter/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets to reduce load and improve client performance
    location ~* \.(?:css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:jpg|jpeg|gif|png|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:woff2?|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri $uri/ =404;
    }
}
